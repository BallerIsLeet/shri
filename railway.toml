# Single root config used by both Railway services (web + worker).
# Each service selects its target package via the SHRI_SERVICE env var:
#   web service:    SHRI_SERVICE=web    (or unset — web is the default)
#   worker service: SHRI_SERVICE=worker
#
# The web service should additionally set healthcheckPath=/api/healthz
# in the Railway dashboard (Settings → Health Check).

[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && pnpm run build:railway"

[deploy]
startCommand = "pnpm start"
restartPolicyType = "always"
